# Spark Report Settings
extent.reporter.spark.start=true
extent.reporter.spark.out=test-reports/SparkReport/Spark.html
extent.reporter.spark.config=src/test/resources/extent-config.xml
extent.reporter.spark.highlight.failed.steps=true
extent.reporter.spark.base64images=true
extent.reporter.spark.document_title=QA-Automation-Report

# Spark View Order Settings
extent.reporter.spark.vieworder=dashboard,test,category,exception,author,device,log

# Screenshot Settings
screenshot.dir=test-reports/screenshots/
screenshot.rel.path=../screenshots/

# PDF Report Settings
extent.reporter.pdf.start=true
extent.reporter.pdf.out=test-reports/PdfReport/ExtentPdf.pdf

# Folder structure Settings
basefolder.name=test-reports
#basefolder.datetimepattern=dd-MM-yyyy_HH-mm-ss


# System Info Settings
systeminfo.os=Windows 11
systeminfo.user=Jasdeep Singh
systeminfo.build=1.1
systeminfo.AppName=AutomationPractice
